<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italy — Regions, Cities & Airports</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');
:root{--sea:#daeaf5;--bg:#f5f0e8;--panel:#faf7f2;--red:#b5312a;--blue:#1a4f80;--text:#2a2218;--muted:#7a6e62}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:10px 16px;border-bottom:1px solid #ddd5c8;display:flex;align-items:baseline;gap:12px;flex-shrink:0}
header h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
header p{font-size:11px;color:var(--muted)}

/* Desktop: map left, panel right */
#main{display:flex;flex:1;overflow:hidden;position:relative;min-height:0}

/* Map */
#map-wrap{flex:1;background:var(--sea);position:relative;overflow:hidden;cursor:grab;user-select:none;min-height:0}
#map-wrap.grabbing{cursor:grabbing}
#svg-container{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;transform-origin:0 0}
#map-wrap svg{width:560px;height:auto;filter:drop-shadow(0 3px 18px rgba(0,0,0,.13))}
.reg{cursor:pointer;stroke:#fff;stroke-width:0.7;stroke-linejoin:round;transition:filter .15s,stroke-width .15s}
.reg:hover{filter:brightness(.82) saturate(1.2)}
.reg.active{filter:brightness(.7) saturate(1.5);stroke-width:1.5;stroke:#fff}
#zoom-btns{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:10}
.zbtn{width:36px;height:36px;border-radius:8px;border:1px solid #c8bfb2;background:var(--panel);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:monospace;transition:background .1s;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.zbtn:hover{background:#ede8df}
#zoom-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:10px;color:#a09080;pointer-events:none;white-space:nowrap}
.sea-label{font-size:7.5px;fill:#6a96b5;font-style:italic;pointer-events:none}

/* Airport tooltip */
#ap-tooltip{position:absolute;background:rgba(15,30,50,.93);color:#f0f4f8;border-radius:7px;padding:9px 12px;font-size:11px;line-height:1.6;pointer-events:none;z-index:30;min-width:190px;max-width:240px;display:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
#ap-tooltip strong{display:block;font-size:13px;font-weight:500;color:#fff;margin-bottom:3px}
#ap-tooltip .ap-code{display:inline-block;background:#1a4f80;color:#b5d4f4;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;margin-bottom:5px;letter-spacing:.06em}
#ap-tooltip .ap-row{display:flex;gap:6px;color:#c8d8e8}
#ap-tooltip .ap-lbl{color:#7a96b0;min-width:56px}
.ap-dot{cursor:pointer}
.ap-dot circle{transition:r .12s,opacity .12s}
.ap-dot:hover circle.bg{r:6;opacity:.3}
.ap-dot:hover circle.fg{r:4}

/* Right panel: region list (desktop only) */
#panel{width:210px;flex-shrink:0;background:var(--panel);border-left:1px solid #ddd5c8;display:flex;flex-direction:column;overflow:hidden;z-index:1}
#ptop{padding:12px 14px;border-bottom:1px solid #e8e0d4;flex-shrink:0}
#ptop h2{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;margin-bottom:8px}
.frow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.fbtn{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid #c8bfb2;background:transparent;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.fbtn.on{background:var(--text);color:#fff;border-color:var(--text)}
.leg{font-size:10px;color:var(--muted)}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid #fff;outline:1px solid #c0392b;flex-shrink:0}
#rlist{flex:1;overflow-y:auto;padding:4px 0}
.ritem{padding:5px 14px;font-size:11px;cursor:pointer;color:var(--muted);border-left:2px solid transparent;transition:all .1s}
.ritem:hover{background:#f0ebe2;color:var(--text)}
.ritem.on{color:var(--text);font-weight:500;border-left-color:var(--red);background:#f0ebe2}

/* Region detail overlay — desktop: slides from right over map */
#detail{
  position:absolute;top:0;right:0;bottom:0;
  width:360px;
  background:var(--panel);
  border-left:1px solid #ddd5c8;
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  z-index:20;
  overflow:hidden;
}
#detail.open{transform:translateX(0)}
#detail-header{padding:14px 16px 10px;border-bottom:1px solid #e8e0d4;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
#detail-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;line-height:1.1}
#detail-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
#close-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:2px 6px;line-height:1;flex-shrink:0;margin-left:8px}
#close-btn:hover{color:var(--text)}
#detail-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:14px}
.d-section h3{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.city-list{display:flex;flex-direction:column;gap:4px}
.city-item{display:flex;align-items:baseline;gap:6px;font-size:12px}
.city-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;margin-bottom:-1px}
.city-name{font-weight:500;color:var(--text)}
.city-desc{color:var(--muted);font-size:11px}
.sight-list{display:flex;flex-direction:column;gap:5px}
.sight-item{font-size:12px;display:flex;gap:7px;align-items:flex-start;cursor:pointer;border-radius:6px;padding:4px 5px;margin:-4px -5px;transition:background .12s}
.sight-item:hover,.sight-item:active{background:#f0ebe2}
.sight-item:hover .sight-text strong,.sight-item:active .sight-text strong{color:var(--blue);text-decoration:underline;text-underline-offset:2px}
.sight-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.sight-text strong{color:var(--text);font-weight:500;transition:color .12s}
.sight-text span{color:var(--muted);font-size:11px;display:block}
.food-list{display:flex;flex-wrap:wrap;gap:6px}
.food-tag{background:#ede8df;border-radius:12px;padding:5px 11px;font-size:12px;color:var(--text);cursor:pointer;transition:background .12s,color .12s}
.food-tag:hover,.food-tag:active{background:var(--blue);color:#fff}

/* Mobile bottom panel hidden on desktop */
#mob-bottom{display:none}

/* ── MOBILE ── */
@media(max-width:640px){
  html{height:100%}
  body{
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  header{padding:8px 14px;flex-shrink:0}
  header h1{font-size:18px}
  header p{display:none}

  /* #main = ONLY the map, no panel inside */
  #main{
    flex:0 0 42vh;
    min-height:0;
    overflow:hidden;
    position:relative;
  }
  #map-wrap{
    position:absolute;inset:0;
    touch-action:none;
  }
  #map-wrap svg{width:295px}
  #zoom-hint{display:none}
  #zoom-btns{bottom:6px;right:8px;gap:3px}
  .zbtn{width:32px;height:32px;font-size:17px}

  /* Hide desktop-only elements */
  #panel{display:none!important}
  #detail{display:none!important}
  #ap-tooltip{display:none!important}

  /* Mobile bottom: fills all remaining height */
  #mob-bottom{
    display:flex;
    flex-direction:column;
    flex:1;
    min-height:0;
    background:var(--panel);
    border-top:2px solid #ddd5c8;
    overflow:hidden;
  }

  /* Controls bar: tabs + toggle buttons */
  #mob-controls{
    flex-shrink:0;
    border-bottom:1px solid #e8e0d4;
    background:var(--panel);
  }

  #mob-tabs{
    display:flex;
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    padding:0 4px;
    gap:0;
  }
  #mob-tabs::-webkit-scrollbar{display:none}

  .mob-tab{
    flex-shrink:0;
    padding:8px 12px;
    font-size:12px;
    font-family:'DM Sans',sans-serif;
    color:var(--muted);
    background:none;
    border:none;
    border-bottom:2px solid transparent;
    cursor:pointer;
    white-space:nowrap;
  }
  .mob-tab.on{
    color:var(--text);
    font-weight:500;
    border-bottom-color:var(--red);
  }

  .frow{padding:4px 10px 6px;margin:0}
  .fbtn{font-size:10px;padding:3px 8px}

  /* Detail content: scrollable */
  #mob-detail{
    flex:1;
    min-height:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:10px 14px 24px;
    display:flex;
    flex-direction:column;
    gap:12px;
    background:var(--bg);
  }
  .mob-empty{color:var(--muted);font-size:12px;text-align:center;padding-top:16px}
  .mob-region-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600}
  .mob-region-sub{font-size:10px;color:var(--muted);margin-bottom:2px}
  .mob-detail .d-section h3,.d-section h3{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px}
  .city-list{display:flex;flex-direction:column;gap:3px}
  .city-item{display:flex;align-items:center;gap:6px;font-size:12px}
  .city-dot{width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0}
  .city-name{font-weight:500;color:var(--text)}
  .city-desc{display:none}
  .sight-list{display:flex;flex-direction:column;gap:3px}
  .sight-item{display:flex;gap:7px;align-items:flex-start;cursor:pointer;border-radius:6px;padding:5px 4px;margin:0 -4px;transition:background .1s;font-size:12px}
  .sight-item:active{background:#f0ebe2}
  .sight-icon{font-size:14px;flex-shrink:0}
  .sight-text strong{color:var(--text);font-weight:500;display:block}
  .sight-text span{color:var(--muted);font-size:11px}
  .food-list{display:flex;flex-wrap:wrap;gap:6px}
  .food-tag{background:#ede8df;border-radius:12px;padding:5px 11px;font-size:11px;color:var(--text);cursor:pointer}
  .food-tag:active{background:var(--blue);color:#fff}

  .reg.active{filter:brightness(.65) saturate(1.8);stroke:#fff;stroke-width:2}
}
</style>
</head>

const NS = "http://www.w3.org/2000/svg";
function mkEl(tag,attrs,parent){const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));if(parent)parent.appendChild(e);return e}

// Airports
const gAp=document.getElementById("airports");
const tooltip=document.getElementById("ap-tooltip");
const mapWrap=document.getElementById("map-wrap");
AIRPORTS.forEach(a=>{
  const g=document.createElementNS(NS,"g");
  g.classList.add("ap-dot");
  g.setAttribute("transform",`translate(${a.x},${a.y})`);
  mkEl("circle",{cx:0,cy:0,r:5,fill:"#1a4f80",opacity:"0.13","class":"bg"},g);
  mkEl("circle",{cx:0,cy:0,r:3,fill:"#1a4f80",opacity:"0.85","class":"fg"},g);
  const t=mkEl("text",{x:0,y:2.5,"text-anchor":"middle","font-size":"6.5",fill:"#fff","font-weight":"700","pointer-events":"none"},g);
  t.textContent="✈";
  g.addEventListener("mouseenter",e=>showTip(a,e));
  g.addEventListener("mousemove",moveTooltip);
  g.addEventListener("mouseleave",hideTip);
  g.addEventListener("touchstart",e=>{e.stopPropagation();showTip(a,e.touches[0]);setTimeout(hideTip,3000)},{passive:true});
  gAp.appendChild(g);
});
function showTip(a,e){
  tooltip.innerHTML=`<span class="ap-code">${a.c}</span><strong>${a.name}</strong>`+
    `<div class="ap-row"><span class="ap-lbl">City</span>${a.city}</div>`+
    `<div class="ap-row"><span class="ap-lbl">Region</span>${a.reg}</div>`+
    `<div class="ap-row"><span class="ap-lbl">Passengers</span>${a.pax}</div>`+
    `<div class="ap-row"><span class="ap-lbl">Runways</span>${a.rwy}</div>`;
  tooltip.style.display="block"; moveTooltip(e);
}
function moveTooltip(e){
  const isMobile=window.innerWidth<=640;
  if(isMobile){tooltip.style.left="0";tooltip.style.top="auto";tooltip.style.bottom="0";return}
  const r=mapWrap.getBoundingClientRect();
  let x=e.clientX-r.left+14,y=e.clientY-r.top+14;
  if(x+240>r.width)x=e.clientX-r.left-250;
  if(y+130>r.height)y=e.clientY-r.top-140;
  tooltip.style.left=x+"px";tooltip.style.top=y+"px";tooltip.style.bottom="auto";
}
function hideTip(){tooltip.style.display="none"}

let activeReg=null;
const isMob=()=>window.innerWidth<=640;

function detailHTML(r){
  return `<div class="d-section">
    <h3>Key cities</h3>
    <div class="city-list">${r.cities.map(c=>`<div class="city-item"><div class="city-dot"></div><span class="city-name">${c.n}</span><span class="city-desc">— ${c.d}</span></div>`).join("")}</div>
  </div>
  <div class="d-section">
    <h3>Must-see sights</h3>
    <div class="sight-list">${r.sights.map(s=>`<div class="sight-item" onclick="gSearch('${s.n.replace(/'/g,"\\'")} Italy')"><span class="sight-icon">${s.i}</span><div class="sight-text"><strong>${s.n}</strong><span>${s.d}</span></div></div>`).join("")}</div>
  </div>
  <div class="d-section">
    <h3>Local cuisine</h3>
    <div class="food-list">${r.food.map(f=>`<span class="food-tag" onclick="gSearch('${f.replace(/'/g,"\\'")} Italian food')">${f}</span>`).join("")}</div>
  </div>`;
}

function selectReg(name,el){
  if(activeReg===name && !isMob()){closeDetail();return}
  activeReg=name;
  // Highlight map region
  document.querySelectorAll(".reg").forEach(p=>p.classList.remove("active"));
  if(el) el.classList.add("active");
  else document.querySelectorAll(`.reg[data-n="${name}"]`).forEach(p=>p.classList.add("active"));

  if(isMob()){
    // Mobile: update tabs, fill mob-detail
    document.querySelectorAll(".mob-tab").forEach(t=>t.classList.remove("on"));
    document.querySelectorAll(`.mob-tab[data-n="${name}"]`).forEach(t=>{
      t.classList.add("on");
      t.scrollIntoView({block:"nearest",inline:"center"});
    });
    const r=REGIONS[name]; if(!r) return;
    const box=document.getElementById("mob-detail");
    box.innerHTML=`<div class="mob-region-title">${name}</div>
      <div class="mob-region-sub">${r.cap} · ${r.pop} · ${r.area}</div>`+detailHTML(r);
    box.scrollTop=0;
    setTimeout(()=>zoomToReg(name),30);
  } else {
    // Desktop: update rlist, open slide panel
    document.querySelectorAll(".ritem").forEach(d=>d.classList.remove("on"));
    document.querySelectorAll(`.ritem[data-n="${name}"]`).forEach(d=>{
      d.classList.add("on");
      d.scrollIntoView({block:"nearest"});
    });
    openDetail(name);
  }
}

function openDetail(name){
  const r=REGIONS[name]; if(!r) return;
  document.getElementById("detail-title").textContent=name;
  document.getElementById("detail-subtitle").textContent=`${r.cap} · ${r.pop} · ${r.area}`;
  const body=document.getElementById("detail-body");
  body.innerHTML=detailHTML(r);
  body.scrollTop=0;
  document.getElementById("detail").classList.add("open");
}
function closeDetail(){
  document.getElementById("detail").classList.remove("open");
  document.querySelectorAll(".reg").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".ritem").forEach(d=>d.classList.remove("on"));
  activeReg=null;
}

function togLayer(id,btn){
  btn.classList.toggle("on");
  document.getElementById(id).style.display=btn.classList.contains("on")?"":"none";
}

// Zoom & Pan
const svgCont=document.getElementById("svg-container");
let scale=1,tx=0,ty=0,dragging=false,startX=0,startY=0,startTx=0,startTy=0;
function applyT(){svgCont.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}
function zoom(f,cx,cy){
  const r=mapWrap.getBoundingClientRect();
  if(cx===undefined)cx=r.width/2; if(cy===undefined)cy=r.height/2;
  const ns=Math.min(8,Math.max(0.4,scale*f));
  tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale); scale=ns; applyT();
}
function resetView(){scale=1;tx=0;ty=0;applyT()}
function zoomToReg(name){
  const path=document.querySelector(`.reg[data-n="${name}"]`);
  if(!path) return;

  const bb=path.getBBox();
  const svgEl=document.getElementById("svg");
  const vb=svgEl.viewBox.baseVal;
  const wrap=mapWrap.getBoundingClientRect();

  // Temporarily reset transform to measure true SVG position
  const savedTx=tx, savedTy=ty, savedScale=scale;
  svgCont.style.transform="none";

  const svgRect=svgEl.getBoundingClientRect();
  const wrapRect=wrap; // already captured

  // SVG origin relative to wrap, with NO transform applied
  const svgX0=svgRect.left-wrapRect.left;
  const svgY0=svgRect.top-wrapRect.top;
  const pxPerUnit=svgRect.width/vb.width;

  // Restore transform immediately
  tx=savedTx; ty=savedTy; scale=savedScale;
  applyT();

  // Region centre in wrap-space at scale=1 (natural SVG layout)
  const regNatX=svgX0+(bb.x-vb.x)*pxPerUnit+bb.width*pxPerUnit/2;
  const regNatY=svgY0+(bb.y-vb.y)*pxPerUnit+bb.height*pxPerUnit/2;
  const regNatW=bb.width*pxPerUnit;
  const regNatH=bb.height*pxPerUnit;

  // Target scale: region fits ~65% of wrap, clamped 1.5–5
  const targetScale=Math.min(5, Math.max(1.5,
    Math.min(wrap.width*0.65/Math.max(regNatW,10),
             wrap.height*0.65/Math.max(regNatH,10))
  ));

  // With transform translate(tx,ty) scale(s), a natural point (px,py) maps to:
  // screen = px*s + tx   =>   tx = screenCentre - px*s
  tx=wrap.width/2  - regNatX*targetScale;
  ty=wrap.height/2 - regNatY*targetScale;
  scale=targetScale;
  applyT();
}
mapWrap.addEventListener("wheel",e=>{e.preventDefault();const r=mapWrap.getBoundingClientRect();zoom(e.deltaY<0?1.15:1/1.15,e.clientX-r.left,e.clientY-r.top)},{passive:false});
mapWrap.addEventListener("mousedown",e=>{if(e.button!==0)return;dragging=true;startX=e.clientX;startY=e.clientY;startTx=tx;startTy=ty;mapWrap.classList.add("grabbing")});
window.addEventListener("mousemove",e=>{if(!dragging)return;tx=startTx+(e.clientX-startX);ty=startTy+(e.clientY-startY);applyT()});
window.addEventListener("mouseup",()=>{dragging=false;mapWrap.classList.remove("grabbing")});
let ltd=null;
mapWrap.addEventListener("touchstart",e=>{if(e.touches.length===1){dragging=true;startX=e.touches[0].clientX;startY=e.touches[0].clientY;startTx=tx;startTy=ty}},{passive:true});
mapWrap.addEventListener("touchmove",e=>{e.preventDefault();if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(ltd){const r=mapWrap.getBoundingClientRect();zoom(d/ltd,(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,(e.touches[0].clientY+e.touches[1].clientY)/2-r.top)}ltd=d}else if(e.touches.length===1&&dragging){tx=startTx+(e.touches[0].clientX-startX);ty=startTy+(e.touches[0].clientY-startY);applyT()}},{passive:false});
mapWrap.addEventListener("touchend",()=>{dragging=false;ltd=null});
</script>
